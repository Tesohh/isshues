version: "2"

linters:
  enable: 
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gosec
    - iface
    - dupl
    - gocritic
    - modernize
    - nestif
    - decorder
    - makezero
    - revive
    - misspell
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: exported
          disabled: true

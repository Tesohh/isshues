services:
  postgres:
    image: 'postgres:18.3'
    restart: always
    ports:
      - 5432:5432
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/18/
  
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080 
    env_file:
      - .env
    depends_on:
      - postgres

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - 2222:2222

volumes:
  postgres-data:
